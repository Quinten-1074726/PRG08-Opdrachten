<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat met Napoleon</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="chat-container">
    <h1>Chat met Napoleon</h1>
    <p>Vraag de keizer naar strategie, leiderschap en geschiedenis.</p>

    <div id="messages" class="messages"></div>

    <form id="chat-form">
      <input type="text" id="input" placeholder="Stel een vraag aan Napoleon..." />
      <button type="submit">Send</button>
    </form>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
